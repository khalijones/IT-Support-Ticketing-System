version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: it-support-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123

  backend:
    build: ./backend
    container_name: it-support-backend
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://admin:password123@mongodb:27017/it-support?authSource=admin
      - JWT_SECRET=your-secret-key-change-in-production
      - PORT=5000
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    container_name: it-support-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongo-data: